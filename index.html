<!DOCTYPE html>
<html>
<head>

<title>Focus HUD</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
padding:5px;
font-size:12px;
}

.block{
display:flex;
align-items:center;
gap:4px;
}

button{
height:22px;
font-size:11px;
background:#333;
color:white;
border:none;
border-radius:3px;
padding:2px 6px;
cursor:pointer;
}

button:hover{
background:#555;
}

select{
height:22px;
font-size:11px;
}

.counter{
font-weight:bold;
color:#4CAF50;
}

.timer{
font-weight:bold;
color:#FF9800;
}

.pomo{
font-weight:bold;
color:#00BCD4;
}

</style>

</head>

<body>

<div class="container">

<div class="block">
C:
<span class="counter" id="countDisplay">0</span>
<button onclick="increment()">+</button>
</div>

<div class="block">
SW:
<span class="timer" id="timer">00:00:00</span>
<button onclick="start()">S</button>
<button onclick="pause()">P</button>
<button onclick="end()">E</button>
</div>

<div class="block">
RP:
<span class="pomo" id="pomodoroTimer">00:00:00</span>

<select id="pomodoroTime">
<option value="60">1m</option>
<option value="300">5m</option>
<option value="900">15m</option>
<option value="1800">30m</option>
<option value="2700">45m</option>
<option value="3600">60m</option>
<option value="7200">2h</option>
<option value="10800">3h</option>
</select>

<button onclick="startPomodoro()">S</button>
<button onclick="endPomodoro()">E</button>

</div>

</div>


<script>

const API="YOUR_SCRIPT_URL"


/* ---------- TIME FORMAT ---------- */

function formatTime(seconds){

let h = Math.floor(seconds / 3600)
let m = Math.floor((seconds % 3600) / 60)
let s = seconds % 60

h = h.toString().padStart(2,"0")
m = m.toString().padStart(2,"0")
s = s.toString().padStart(2,"0")

return `${h}:${m}:${s}`

}


/* ---------- COUNTER ---------- */

let focusCount=0

function increment(){

focusCount++

document.getElementById("countDisplay").innerText=focusCount

fetch(API+"?action=increment")

}


/* ---------- STOPWATCH ---------- */

let startTime
let interval
let elapsed=0

function start(){

startTime=new Date()

interval=setInterval(()=>{

elapsed++

document.getElementById("timer").innerText=formatTime(elapsed)

},1000)

}

function pause(){

clearInterval(interval)

}

function end(){

clearInterval(interval)

let endTime=new Date()

fetch(API+"?action=stopwatch"
+"&start="+startTime
+"&end="+endTime
+"&duration="+elapsed)

elapsed=0

document.getElementById("timer").innerText="00:00:00"

}


/* ---------- REVERSE POMODORO ---------- */

let pomoInterval
let remaining

function startPomodoro(){

remaining=parseInt(document.getElementById("pomodoroTime").value)

document.getElementById("pomodoroTimer").innerText=formatTime(remaining)

pomoInterval=setInterval(()=>{

remaining--

document.getElementById("pomodoroTimer").innerText=formatTime(remaining)

if(remaining<=0){

clearInterval(pomoInterval)

alert("Pomodoro Complete")

}

},1000)

}

function endPomodoro(){

clearInterval(pomoInterval)

let target=document.getElementById("pomodoroTime").value

let actual=target-remaining

fetch(API+"?action=pomodoro"
+"&target="+target
+"&actual="+actual)

document.getElementById("pomodoroTimer").innerText="00:00:00"

}

</script>

</body>
</html>
