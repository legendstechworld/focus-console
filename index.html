<!DOCTYPE html>
<html>

<head>

<title>Focus Console</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{

width:120px;
height:40px;
margin:6px;
font-size:14px;
background:#333;
color:white;
border:none;
border-radius:6px;

}

button:hover{
background:#555;
}

#timer{

font-size:36px;
margin:10px;

}

#countDisplay{

font-size:28px;
margin:10px;

}

#pomodoroTimer{

font-size:28px;
margin:10px;

}

select{
height:35px;
}

hr{
margin:25px;
border-color:#444;
}

</style>

</head>


<body>

<h2>Focus Console</h2>

<button onclick="openMini()">Mini Mode</button>

<hr>


<h3>Counter</h3>

<div id="countDisplay">0</div>

<button onclick="increment()">+1 Focus</button>


<hr>


<h3>Stopwatch</h3>

<div id="timer">0</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="end()">End</button>


<hr>


<h3>Reverse Pomodoro</h3>

<div id="pomodoroTimer">0</div>

<select id="pomodoroTime">

<option value="60">1 min</option>
<option value="300">5 min</option>
<option value="900">15 min</option>
<option value="1800">30 min</option>
<option value="2700">45 min</option>
<option value="3600">60 min</option>
<option value="7200">2 hr</option>
<option value="10800">3 hr</option>
<option value="14400">4 hr</option>

</select>

<br><br>

<button onclick="startPomodoro()">Start</button>
<button onclick="endPomodoro()">End</button>



<script>

const API="YOUR_SCRIPT_URL"



/* -------------------
COUNTER
-------------------*/

let focusCount=0

function increment(){

focusCount++

document.getElementById("countDisplay").innerText=focusCount

fetch(API+"?action=increment")

}



/* -------------------
STOPWATCH
-------------------*/


let startTime
let interval
let elapsed=0

function start(){

startTime=new Date()

interval=setInterval(()=>{

elapsed++

document.getElementById("timer").innerText=elapsed

},1000)

}

function pause(){

clearInterval(interval)

}

function end(){

clearInterval(interval)

let endTime=new Date()

fetch(API+"?action=stopwatch"
+"&start="+startTime
+"&end="+endTime
+"&duration="+elapsed)

elapsed=0

document.getElementById("timer").innerText=0

}



/* -------------------
REVERSE POMODORO
-------------------*/


let pomoInterval
let remaining


function startPomodoro(){

remaining=parseInt(document.getElementById("pomodoroTime").value)

document.getElementById("pomodoroTimer").innerText=remaining

pomoInterval=setInterval(()=>{

remaining--

document.getElementById("pomodoroTimer").innerText=remaining

if(remaining<=0){

clearInterval(pomoInterval)

alert("Pomodoro Complete")

}

},1000)

}



function endPomodoro(){

clearInterval(pomoInterval)

let target=document.getElementById("pomodoroTime").value

let actual=target-remaining

fetch(API+"?action=pomodoro"
+"&target="+target
+"&actual="+actual)

document.getElementById("pomodoroTimer").innerText=0

}



/* -------------------
MINI FLOATING MODE
-------------------*/


function openMini(){

window.open(
window.location.href,
"focusMini",
"width=900,height=120"
)

}

</script>

</body>
</html>
